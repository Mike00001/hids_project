<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIDS - Cyber Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        body { scrollbar-width: thin; scrollbar-color: #1f2937 #111827; background-color: #0a0f16; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
    </style>
</head>
<body class="text-green-400 font-mono p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-green-900/50 pb-4 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-bold uppercase tracking-tighter text-green-500">[>] HIDS_SEC_MONITOR_ <span class="text-[10px] font-normal lowercase text-gray-500">v2.0-pro</span></h1>
            <div class="flex items-center space-x-3 bg-black/40 p-2 rounded border border-gray-800">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></span>
                <span id="status-text" class="text-xs uppercase tracking-widest text-gray-400">Offline</span>
            </div>
        </header>

        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="p-3 border border-gray-800 bg-gray-900/50 rounded shadow-inner text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">System Health</p>
                <p id="stat-system" class="text-lg font-bold text-green-500">STABLE</p>
            </div>
            <div class="p-3 border border-gray-800 bg-gray-900/50 rounded shadow-inner text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Failed Logins</p>
                <p id="stat-users" class="text-lg font-bold text-white">0</p>
            </div>
            <div class="p-3 border border-gray-800 bg-gray-900/50 rounded shadow-inner text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Open Ports</p>
                <p id="stat-network" class="text-lg font-bold text-white">--</p>
            </div>
            <div class="p-3 border border-gray-800 bg-gray-900/50 rounded shadow-inner text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">FIM Status</p>
                <p id="stat-fim" class="text-lg font-bold text-green-500">SECURE</p>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 p-4 border border-gray-800 bg-gray-900/50 rounded shadow-lg">
                <h2 class="text-xs text-gray-500 mb-4 uppercase font-bold">/ Performance Telemetry</h2>
                <canvas id="metricsChart" height="120"></canvas>
            </div>
            <div class="p-4 border border-gray-800 bg-gray-900/50 rounded shadow-lg flex flex-col items-center">
                <h2 class="text-xs text-gray-500 mb-4 self-start uppercase font-bold">/ Disk Allocation</h2>
                <div class="relative w-full aspect-square flex items-center justify-center max-w-[200px]">
                    <canvas id="diskChart"></canvas>
                    <div id="disk-label" class="absolute text-2xl font-bold text-white">0%</div>
                </div>
            </div>
        </section>

        <section class="mb-8 p-4 border border-gray-800 bg-gray-900/50 rounded shadow-lg">
            <h2 class="text-xs text-gray-500 mb-4 uppercase font-bold">/ Active Process Audit</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead>
                        <tr class="border-b border-gray-800 text-gray-500 uppercase">
                            <th class="pb-2">PID</th><th class="pb-2">User</th><th class="pb-2">CPU%</th><th class="pb-2">Command</th><th class="pb-2 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="process-table">
                        <tr><td colspan="5" class="py-4 text-center text-gray-600 italic">Waiting for telemetry...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <main>
            <div class="flex justify-between items-end mb-4 border-b border-gray-800 pb-2">
                <h2 class="text-xs text-gray-500 uppercase font-bold">/ Incident Stream</h2>
                <div class="flex space-x-2">
                    <button id="btn-info" onclick="toggleFilter('INFO', 'btn-info')" class="px-2 py-1 text-[10px] border border-blue-600 bg-blue-900/20 text-blue-400 rounded">INFO</button>
                    <button id="btn-warning" onclick="toggleFilter('WARNING', 'btn-warning')" class="px-2 py-1 text-[10px] border border-yellow-600 bg-yellow-900/20 text-yellow-400 rounded">WARN</button>
                    <button id="btn-critical" onclick="toggleFilter('CRITICAL', 'btn-critical')" class="px-2 py-1 text-[10px] border border-red-600 bg-red-900/20 text-red-400 rounded shadow-[0_0_5px_rgba(239,68,68,0.3)]">CRIT</button>
                    <div class="w-px bg-gray-800 mx-1"></div>
                    <button onclick="clearAlerts()" class="px-2 py-1 text-[10px] border border-gray-700 bg-gray-800 text-gray-500 hover:text-white transition-colors rounded">CLEAR</button>
                </div>
            </div>
            <div id="alerts-container" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar"></div>
        </main>
    </div>

    <script>
        const serverIP = window.location.hostname;
        const serverPort = window.location.port || "8000";
        const ws = new WebSocket(`ws://${serverIP}:${serverPort}/ws/alerts`);

        let alertHistory = [];
        const MAX_ALERTS = 50;
        let activeFilters = { 'INFO': true, 'WARNING': true, 'CRITICAL': true };

        // --- AUDIO ALERT ---
        function playAlert() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }

        // --- CHARTS CONFIG ---
        Chart.defaults.color = '#6b7280';
        Chart.defaults.font.family = 'monospace';
        const metricsChart = new Chart(document.getElementById('metricsChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'CPU', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 },
                { label: 'RAM', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }
            ]},
            options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: '#1f2937' } }, x: { grid: { display: false } } }, plugins: { legend: { labels: { boxWidth: 12, font: { size: 10 } } } } }
        });

        const diskChart = new Chart(document.getElementById('diskChart'), {
            type: 'doughnut',
            data: { labels: ['Used', 'Free'], datasets: [{ data: [0, 100], backgroundColor: ['#10b981', '#111827'], borderWidth: 0, cutout: '82%' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // --- RENDER LOGIC ---
        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';
            
            alertHistory.forEach(data => {
                if (activeFilters[data.severity || 'INFO']) {
                    const sevStyle = data.severity === 'CRITICAL' ? 'border-l-4 border-red-600 bg-red-950/20 text-red-200' : 
                                   data.severity === 'WARNING' ? 'border-l-4 border-yellow-600 bg-yellow-950/20 text-yellow-200' : 
                                   'border-l-4 border-blue-600 bg-blue-950/10 text-blue-300';

                    let context = "";
                    if (data.module === "user_activity" && data.failed_attempts) context = `👤 Auth Logs: <span class="text-white font-bold">${data.failed_attempts} failed attempts</span> detected`;
                    else if (data.module === "process_audit" && data.top_processes) context = `⚙️ Critical Proc: <span class="text-white font-bold">${data.top_processes[0].cmd}</span> (CPU: ${data.top_processes[0].cpu}%)`;
                    else if (data.module === "network_audit") context = `🌐 Active network ports: <span class="text-white font-bold">${data.open_ports}</span>`;
                    else if (data.module === "file_integrity") context = `📁 Target: <span class="text-white font-bold">${data.message.includes('sudoers') ? '/etc/sudoers' : 'System Config'}</span>`;

                    container.innerHTML += `
                        <div class="p-3 rounded border border-white/5 shadow-lg ${sevStyle} animate-fade-in text-[13px]">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold tracking-widest text-[9px] bg-black/40 px-2 py-0.5 rounded border border-white/10 uppercase">${data.module || 'SYS'}</span>
                                <span class="opacity-40 text-[10px]">${data.timestamp ? data.timestamp.split(' ')[1] : ''}</span>
                            </div>
                            <p class="font-medium text-gray-100">${data.message || 'Check complete'}</p>
                            ${context ? `<p class="text-[11px] opacity-70 mt-2 font-mono bg-black/30 p-1.5 rounded-sm border-l border-white/10">${context}</p>` : ''}
                        </div>`;
                }
            });
        }

        function toggleFilter(sev, id) { activeFilters[sev] = !activeFilters[sev]; document.getElementById(id).classList.toggle('opacity-30'); renderAlerts(); }
        function clearAlerts() { alertHistory = []; renderAlerts(); }

        // --- WS HANDLER ---
        ws.onopen = () => {
            document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#10b981]";
            document.getElementById('status-text').innerText = "Connected (Live)";
            document.getElementById('status-text').className = "text-xs uppercase tracking-widest text-green-500";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.command === "clear") {
                clearAlerts();
                return;
            }

            alertHistory.unshift(data);
            if (alertHistory.length > MAX_ALERTS) alertHistory.pop();
            if (data.severity === 'CRITICAL') playAlert();

            // Update Stats & Charts
            if (data.module === "system_health") {
                const el = document.getElementById('stat-system');
                el.innerText = data.severity === "CRITICAL" ? "CRITICAL" : data.severity === "WARNING" ? "STRESSED" : "STABLE";
                el.className = `text-lg font-bold ${data.severity === "CRITICAL" ? "text-red-500" : data.severity === "WARNING" ? "text-yellow-500" : "text-green-500"}`;
                if (data.load !== undefined) {
                    if (metricsChart.data.labels.length >= 15) { metricsChart.data.labels.shift(); metricsChart.data.datasets[0].data.shift(); metricsChart.data.datasets[1].data.shift(); }
                    metricsChart.data.labels.push(data.timestamp ? data.timestamp.split(' ')[1] : '');
                    metricsChart.data.datasets[0].data.push(data.load);
                    metricsChart.data.datasets[1].data.push(data.memory);
                    metricsChart.update();
                }
                if (data.disk !== undefined) {
                    const used = parseInt(data.disk);
                    diskChart.data.datasets[0].data = [used, 100 - used];
                    diskChart.data.datasets[0].backgroundColor[0] = used > 90 ? '#ef4444' : used > 70 ? '#f59e0b' : '#10b981';
                    diskChart.update();
                    document.getElementById('disk-label').innerText = used + '%';
                }
            }
            if (data.module === "user_activity" && data.failed_attempts !== undefined) {
                document.getElementById('stat-users').innerText = data.failed_attempts;
                document.getElementById('stat-users').className = `text-lg font-bold ${parseInt(data.failed_attempts) > 5 ? 'text-red-500' : 'text-white'}`;
            }
            if (data.module === "network_audit") document.getElementById('stat-network').innerText = data.open_ports || '--';
            if (data.module === "file_integrity") {
                const el = document.getElementById('stat-fim');
                el.innerText = data.status === "MODIFIED" ? "CHANGED" : "SECURE";
                el.className = `text-lg font-bold ${data.status === "MODIFIED" ? "text-red-500" : "text-green-500"}`;
            }
            if (data.module === "process_audit" && data.top_processes) {
                const tableBody = document.getElementById('process-table');
                tableBody.innerHTML = '';
                data.top_processes.forEach(proc => {
                    const isSuspicious = proc.cpu > 80 || (proc.user === 'root' && proc.cmd.includes('./'));
                    tableBody.innerHTML += `<tr class="border-b border-gray-800/50 hover:bg-gray-700/20 transition-colors"><td class="py-2 text-gray-500">${proc.pid}</td><td class="py-2 text-gray-300">${proc.user}</td><td class="py-2 ${proc.cpu > 50 ? 'text-yellow-500 font-bold' : ''}">${proc.cpu}%</td><td class="py-2 text-white truncate max-w-[180px]">${proc.cmd}</td><td class="py-2 text-right"><span class="px-2 py-0.5 rounded-sm text-[8px] font-bold ${isSuspicious ? 'bg-red-900/40 text-red-400 border border-red-500/50 animate-pulse' : 'bg-green-900/30 text-green-400 border border-green-500/30'}">${isSuspicious ? 'SUSPICIOUS' : 'TRUSTED'}</span></td></tr>`;
                });
            }
            renderAlerts();
        };

        ws.onclose = () => {
            document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
            document.getElementById('status-text').innerText = "Offline";
            document.getElementById('status-text').className = "text-xs uppercase tracking-widest text-red-500";
        };
    </script>
</body>
</html>
