<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel HIDS | Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border: 1px solid #e2e8f0; }
        .incident-card { border-left: 4px solid #6366f1; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 p-4 card rounded-xl shadow-sm">
            <h1 class="font-bold text-xl text-slate-900">SENTINEL <span class="text-indigo-600">HIDS</span></h1>
            <div class="flex items-center space-x-2 bg-slate-100 px-3 py-1 rounded-full border">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="conn-label" class="text-[10px] font-bold text-slate-500 uppercase">Disconnected</span>
            </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="card p-4 rounded-xl"><p class="text-[10px] font-bold text-slate-400 uppercase">Load</p><p id="stat-system" class="text-2xl font-bold tracking-tighter">--</p></div>
            <div class="card p-4 rounded-xl"><p class="text-[10px] font-bold text-slate-400 uppercase">Auth Fail</p><p id="stat-users" class="text-2xl font-bold tracking-tighter">0</p></div>
            <div class="card p-4 rounded-xl"><p class="text-[10px] font-bold text-slate-400 uppercase">Network</p><p id="stat-network" class="text-2xl font-bold tracking-tighter">0</p></div>
            <div class="card p-4 rounded-xl"><p class="text-[10px] font-bold text-slate-400 uppercase">FIM</p><p id="stat-fim" class="text-xl font-bold text-emerald-600 italic">SECURE</p></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 card p-4 rounded-xl"><canvas id="metricsChart" height="100"></canvas></div>
            <div class="card flex flex-col rounded-xl max-h-[500px]">
                <div class="p-3 border-b font-bold text-xs uppercase text-slate-500">Security Events</div>
                <div id="alerts-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50"></div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let alertHistory = [];

        const ctx = document.getElementById('metricsChart').getContext('2d');
        const metricsChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Load', data: [], borderColor: '#4f46e5', tension: 0.3, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' }]},
            options: { responsive: true, scales: { y: { beginAtZero: true }, x: { display: false } } }
        });

        function connect() {
            const serverIP = window.location.hostname;
            const serverPort = window.location.port || "8000";
            ws = new WebSocket(`ws://${serverIP}:${serverPort}/ws/alerts`);

            ws.onopen = () => {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('conn-label').innerText = "Live Connection";
                console.log("Connected to Sentinel Backend");
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // COMMANDES FORCEES
                if (data.command === "reload") { location.reload(); return; }
                if (data.command === "clear") { 
                    alertHistory = []; 
                    document.getElementById('alerts-container').innerHTML = '';
                    document.getElementById('stat-users').innerText = "0";
                    document.getElementById('stat-fim').innerText = "SECURE";
                    document.getElementById('stat-fim').className = "text-xl font-bold text-emerald-600 italic";
                    return; 
                }

                // MISE À JOUR UI
                if (data.module === "system_health") {
                    document.getElementById('stat-system').innerText = data.load;
                    metricsChart.data.labels.push("");
                    metricsChart.data.datasets[0].data.push(data.load);
                    if (metricsChart.data.labels.length > 20) { metricsChart.data.labels.shift(); metricsChart.data.datasets[0].data.shift(); }
                    metricsChart.update('none');
                }
                if (data.module === "user_activity") document.getElementById('stat-users').innerText = data.failed_attempts;
                if (data.module === "network_audit") document.getElementById('stat-network').innerText = data.open_ports;
                if (data.module === "file_integrity") {
                    const isMod = data.status === "MODIFIED";
                    document.getElementById('stat-fim').innerText = isMod ? "ALERT" : "SECURE";
                    document.getElementById('stat-fim').className = `text-xl font-bold italic ${isMod ? 'text-rose-600' : 'text-emerald-600'}`;
                }

                // AJOUT ALERTE
                alertHistory.unshift(data);
                const container = document.getElementById('alerts-container');
                container.innerHTML = `<div class="p-3 card rounded-lg incident-card text-xs mb-2">
                    <div class="flex justify-between font-bold text-[9px] uppercase text-slate-400 mb-1">
                        <span>${data.module}</span><span>${data.timestamp ? data.timestamp.split(' ')[1] : ''}</span>
                    </div>
                    <p class="font-bold text-slate-800">${data.message}</p>
                </div>` + container.innerHTML;
            };

            ws.onclose = () => {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                document.getElementById('conn-label').innerText = "Offline - Retrying...";
                setTimeout(connect, 1000); // Reconnexion super rapide
            };
        }

        connect();
    </script>
</body>
</html>
