<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIDS - Cyber Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-green-400 font-mono p-8 min-h-screen">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-green-700 pb-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold uppercase tracking-widest text-green-500">
                [>] HIDS Dashboard_
            </h1>
            <div class="flex items-center space-x-2">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></span>
                <span id="status-text" class="text-sm">Déconnecté</span>
            </div>
        </header>

        <main>
            <h2 class="text-xl mb-4 text-gray-400">Flux d'alertes en temps réel</h2>
            <div id="alerts-container" class="space-y-4">
                </div>
        </main>
    </div>

    <script>
        // Connexion à ton API locale
        const ws = new WebSocket("ws://127.0.0.1:8000/ws/alerts");
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const alertsContainer = document.getElementById('alerts-container');

        // Événement : Connexion réussie
        ws.onopen = () => {
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            statusText.innerText = "Connecté (En écoute...)";
        };

        // Événement : Réception d'un message du serveur
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const alertElement = document.createElement('div');
            
            // Couleurs selon la gravité
            let borderClass = data.severity === 'CRITICAL' ? 'border-red-600 bg-red-900 bg-opacity-20' : 
                              data.severity === 'WARNING' ? 'border-yellow-600' : 'border-green-600';
            let textClass = data.severity === 'CRITICAL' ? 'text-red-400 font-bold' : 
                            data.severity === 'WARNING' ? 'text-yellow-400' : 'text-green-400';

            alertElement.className = `p-4 border ${borderClass} rounded shadow-lg transition-all duration-300`;
            alertElement.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-xs text-gray-500">[${data.timestamp || 'N/A'}]</span>
                        <span class="ml-2 ${textClass}">[${data.severity || 'INFO'}]</span>
                        <p class="mt-2 text-white">${data.message || data.msg || 'Alerte reçue'}</p>
                    </div>
                    <div class="text-xs text-gray-500 uppercase">${data.module || data.type || 'SYSTEM'}</div>
                </div>
            `;
            // Ajoute l'alerte tout en haut de la liste
            alertsContainer.prepend(alertElement);
        };

        ws.onclose = () => {
            statusDot.classList.replace('bg-green-500', 'bg-red-500');
            statusText.innerText = "Déconnecté";
        };
    </script>
</body>
</html>
