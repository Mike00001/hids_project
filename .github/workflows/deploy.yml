name: HIDS Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update local repository
        run: |
          cd /opt/hids-project/hids_project
          git fetch origin main
          git reset --hard origin/main

      - name: Set executable permissions
        run: |
          chmod +x /opt/hids-project/hids_project/Modules_JSON/*.sh

      - name: Restart HIDS Dashboard Service
        run: |
          sudo systemctl restart hids-dashboard
